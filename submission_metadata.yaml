ai_tools_used:
  - "Claude"
ai_usage_summary: |
  Used Claude (Claude Code) for architecture design, code review, and the
  reasoning-template design. No candidate data was sent to any hosted LLM; the
  ranking step runs fully offline with no API calls.

methodology_summary: |
  Hybrid interpretable ranker. Six structured features (semantic JD-vs-work-evidence,
  demonstrated IR/ranking/recsys domain evidence, experience-band fit, product-vs-
  services, trust-gated skills, location) combined with a behavioural-availability
  multiplier from the 23 Redrob signals. Non-fit titles are hard-capped (keyword-
  stuffer guard) and impossible profiles hard-zeroed (honeypot net). Reasoning is
  deterministic and fact-grounded (no LLM, no hallucination). Ranking step runs in
  seconds on CPU; dense sentence-transformer embeddings are precomputed offline and
  loaded as numpy, with a TF-IDF fallback so it reproduces in any sandbox.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
