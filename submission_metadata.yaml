ai_tools_used:
  - "Claude"
ai_usage_summary: |
  Used Claude (Claude Code) as a pair-programmer for extending the reference
  implementation: tuning the JD-decoded weights/penalties, the reasoning
  templates, the sandbox app, and code review. No candidate data was ever sent
  to any hosted LLM; the ranking step runs fully offline with no API calls.

methodology_summary: |
  Interpretable hybrid ranker. Six structured features in [0,1] -- a semantic
  match of the JD against each candidate's WORK EVIDENCE (career history +
  summary, not the raw skill list), demonstrated IR/ranking/search/recsys domain
  evidence, experience-band fit (6-8 yr), product-vs-services, trust-gated skills
  (stuffed 0-endorsement skills earn nothing), and location -- combined with a
  behavioural-availability multiplier built from the 23 Redrob signals. Guards:
  a non-fit-title hard cap sinks keyword stuffers (HR/Sales/Marketing with AI
  skills), a high-precision impossibility check zeroes honeypots, and an
  abroad-and-won't-relocate penalty drops unhirable profiles (JD: no visa
  sponsorship). Reasoning is deterministic and fact-grounded (no LLM) so it never
  hallucinates skills/employers not in the profile. The SUBMITTED ranking uses a
  pure scikit-learn TF-IDF semantic backend -- CPU-only, no network, no
  downloads, ~100 s on the full 100k pool in under 8 GB -- so it reproduces in
  any sandbox. An optional dense bge-small backend (precomputed offline, loaded
  as numpy) is included and auto-used if its artifacts are present.

declarations:
  read_submission_spec: true
  code_is_original_work: true       # extends the provided reference implementation; all tuning is ours
  no_collusion: true
  honeypot_check_done: true         # 0% honeypots in top-100 (verified)
  reproduction_tested: true
